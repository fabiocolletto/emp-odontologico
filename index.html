<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OdontoFlow - Shell</title>
    <link rel="stylesheet" href="./apps/web-demo/styles.css" />
    <script>
      // Demo shell: silencia avisos esperados de CDN/Babel no console para reduzir ruído local.
      (function () {
        const blocked = [
          'cdn.tailwindcss.com should not be used in production',
          'You are using the in-browser Babel transformer'
        ];
        const originalWarn = console.warn;
        console.warn = function (...args) {
          const message = String(args[0] ?? '');
          if (blocked.some((entry) => message.includes(entry))) return;
          return originalWarn.apply(this, args);
        };
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react" src="./apps/web-demo/standalone-react.jsx"></script>
  </body>
</html>
