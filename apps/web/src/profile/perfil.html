<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OdontoFlow • Perfil</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="../shared/html-widget-common.css" />
    <link rel="stylesheet" href="./perfil.css" />
  </head>
  <body>
    <main class="perfil-page of-main-inner of-flat-page of-view-level-1" data-perfil-app data-nav-level="1">
      <header class="of-flat-header">
        <div class="of-flat-title-row">
          <span class="of-flat-title-icon of-flat-title-icon--perfil" aria-hidden="true">◍</span>
          <div>
            <p class="of-flat-subtitle">Conta e preferências</p>
            <h1 class="of-flat-title">Perfil</h1>
          </div>
        </div>
      </header>

      <section class="perfil-kpi-grid of-flat-metric-row" aria-label="Resumo de conta">
        <article class="perfil-kpi-card of-card of-kpi-card" data-kpi="clinics"></article>
        <article class="perfil-kpi-card of-card of-kpi-card" data-kpi="active"></article>
        <article class="perfil-kpi-card of-card of-kpi-card" data-kpi="security"></article>
      </section>

      <section class="perfil-section of-card of-flat-section">
        <header class="perfil-section__header of-flat-section-header">
          <h2>Dados de acesso</h2>
          <div class="perfil-section__actions of-flat-action-row">
            <button type="button" class="perfil-btn perfil-btn--ghost of-button of-button--secondary" data-action="reset-model">Recarregar modelo</button>
            <button type="button" class="perfil-btn of-button of-button--primary" data-action="edit-account">Editar conta</button>
          </div>
        </header>

        <div class="perfil-grid" data-grid="summary"></div>
      </section>

      <section class="perfil-section of-card of-flat-section">
        <header class="perfil-section__header of-flat-section-header"><h2>Preferências</h2></header>
        <form class="perfil-preferences" data-form="preferences">
          <label><input type="checkbox" name="notify_whatsapp" /> Notificações via WhatsApp</label>
          <label><input type="checkbox" name="notify_email" /> Notificações via e-mail</label>
          <label><input type="checkbox" name="daily_digest" /> Resumo diário de agenda</label>
          <label>Fuso horário
            <select name="timezone">
              <option value="America/Sao_Paulo">America/Sao_Paulo</option>
              <option value="America/Fortaleza">America/Fortaleza</option>
              <option value="America/Manaus">America/Manaus</option>
            </select>
          </label>
          <menu>
            <button type="submit" class="perfil-btn of-button of-button--primary">Salvar preferências</button>
          </menu>
          <p class="perfil-feedback" data-feedback></p>
        </form>
      </section>

      <section class="perfil-section of-card of-flat-section" data-legacy="true">
        <header class="perfil-section__header of-flat-section-header"><h2>Rastreabilidade de limpeza</h2></header>
        <ul class="perfil-chip-row" data-grid="legacy"></ul>
      </section>
    </main>

    <dialog class="perfil-dialog" data-dialog="account">
      <form method="dialog" class="perfil-form" data-form="account">
        <h3 data-form-title="account">Editar conta</h3>
        <label>Nome completo
          <input name="full_name" required maxlength="100" />
        </label>
        <label>E-mail
          <input type="email" name="email" required maxlength="100" />
        </label>
        <label>Telefone
          <input name="phone" maxlength="30" />
        </label>
        <label>Cargo principal
          <select name="primary_role" required>
            <option value="admin">Administrador</option>
            <option value="dentista">Dentista</option>
            <option value="financeiro">Financeiro</option>
            <option value="recepcao">Recepção</option>
          </select>
        </label>
        <menu>
          <button value="cancel" class="perfil-btn perfil-btn--ghost of-button of-button--secondary">Cancelar</button>
          <button value="default" class="perfil-btn of-button of-button--primary">Salvar</button>
        </menu>
      </form>
    </dialog>

    <script src="./perfil.js"></script>
  </body>
</html>
