<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odontoflow | Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" />
  <style>
    :root {
      --bg: #f2f5fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --verde: #16a34a;
      --vermelho: #dc2626;
      --azul: #2563eb;
      --amarelo: #f59e0b;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1.25rem;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    .dashboard { max-width: 1400px; margin: 0 auto; display: grid; gap: 1rem; }
    .header, .panel, .kpi-card, .alert-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }

    .header { padding: 1rem 1.25rem; display: grid; gap: .8rem; }
    .header-top { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .header h1 { margin: 0; }
    .header p { margin: .35rem 0 0; color: var(--muted); }
    .actions { display: flex; gap: .6rem; flex-wrap: wrap; }
    .btn, .filter {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: .65rem .9rem;
      background: #fff;
      font-weight: 600;
    }
    .btn.green { color: var(--verde); border-color: #bbf7d0; }
    .btn.red { color: var(--vermelho); border-color: #fecaca; }
    .btn.blue { color: var(--azul); border-color: #bfdbfe; }

    .kpi-grid { display: grid; gap: 1rem; grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .kpi-card { padding: 1rem; }
    .kpi-card header { display: flex; justify-content: space-between; gap: 1rem; color: var(--muted); }
    .kpi-value { margin: .7rem 0 0; font-size: clamp(1.25rem, 2.6vw, 2rem); font-weight: 700; white-space: nowrap; }
    .kpi-trend.up { color: var(--verde); }
    .kpi-trend.down { color: var(--vermelho); }

    .secondary-kpi { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }

    .panel { padding: 1rem; }
    .panel h3 { margin: 0; font-size: 1rem; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }

    .main-chart { min-height: 320px; }
    .charts-two { display: grid; gap: 1rem; grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .tables { display: grid; gap: 1rem; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 560px; }
    th, td { text-align: left; font-size: .88rem; padding: .65rem .5rem; border-bottom: 1px solid #edf2f7; }
    th { color: var(--muted); font-weight: 600; }
    .status { border-radius: 999px; padding: .2rem .55rem; font-size: .75rem; font-weight: 700; display: inline-block; }
    .status.vencido { background: #fee2e2; color: var(--vermelho); }
    .status.aprovar, .status.previsto { background: #fef3c7; color: #a16207; }
    .status.ok, .status.pago, .status.recebido { background: #dcfce7; color: var(--verde); }

    .alerts { display: grid; gap: .7rem; }
    .alert-item { padding: .8rem; display: flex; gap: .7rem; align-items: center; }
    .alert-item i { font-size: 1.1rem; }
    .alert-item.alerta i { color: var(--amarelo); }
    .alert-item.critico i { color: var(--vermelho); }
    .alert-item.aviso i { color: var(--azul); }

    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .charts-two, .tables { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      body { padding: .7rem; }
      .header-top { flex-direction: column; align-items: flex-start; }
      .kpi-grid, .secondary-kpi { grid-template-columns: 1fr; }
      .main-chart { order: -1; }
      table { min-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="header">
      <div class="header-top">
        <div>
          <span style="color:var(--azul); font-weight:700;">Financeiro</span>
          <h1>Dashboard Financeiro</h1>
          <p>Visão geral da saúde financeira da clínica</p>
        </div>
        <div class="actions">
          <select class="filter">
            <option>01/04/2026 - 30/04/2026</option>
            <option>01/03/2026 - 31/03/2026</option>
          </select>
          <button class="btn green">Novo recebimento</button>
          <button class="btn red">Nova despesa</button>
          <button class="btn blue">Exportar relatório</button>
        </div>
      </div>
    </section>

    <section class="kpi-grid" id="kpi-grid"></section>
    <section class="secondary-kpi" id="secondary-kpi"></section>
    <section class="panel main-chart"><canvas id="chart-evolucao" height="110"></canvas></section>
    <section class="charts-two">
      <article class="panel"><h3>Receita por origem</h3><canvas id="chart-receita-origem"></canvas></article>
      <article class="panel"><h3>Despesas por categoria</h3><canvas id="chart-despesas-categoria"></canvas></article>
    </section>

    <section class="tables" id="tables"></section>

    <section class="panel">
      <h3>Alertas e insights</h3>
      <div class="alerts" id="alerts"></div>
    </section>
  </main>

  <script src="./data/mock-financeiro.js"></script>
  <script>
    const money = (value) => value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    async function loadTemplate(path, id) {
      const markup = await fetch(path).then((res) => res.text());
      const parser = new DOMParser();
      const doc = parser.parseFromString(markup, 'text/html');
      return doc.querySelector(id).content.firstElementChild;
    }

    function statusClass(status) {
      if (["pago", "recebido"].includes(status)) return "ok";
      if (["vencido"].includes(status)) return "vencido";
      return "aprovar";
    }

    async function render() {
      const data = window.financeiroMock;
      const resumo = data.resumoFinanceiro(data.lancamentos);

      const kpiTemplate = await loadTemplate('./components/kpi-card.html', '#kpi-card-template');
      const items = [
        { label: 'Receita recebida', valor: resumo.receitaRecebida, trend: '+18,6%', cls: 'up' },
        { label: 'Despesas pagas', valor: resumo.despesasPagas, trend: '+9,4%', cls: 'down' },
        { label: 'Resultado líquido', valor: resumo.resultadoLiquido, trend: '+28,7%', cls: 'up' },
        { label: 'A receber', valor: resumo.aReceber, trend: '-5,2%', cls: 'down' }
      ];

      items.forEach((item) => {
        const node = kpiTemplate.cloneNode(true);
        node.querySelector('.kpi-label').textContent = item.label;
        node.querySelector('.kpi-value').textContent = money(item.valor);
        const trend = node.querySelector('.kpi-trend');
        trend.classList.add(item.cls);
        trend.textContent = `${item.trend} vs mês anterior`;
        document.querySelector('#kpi-grid').append(node);
      });

      const secondary = [
        { label: 'Ticket médio', valor: resumo.ticketMedio, trend: '+12,3%', cls: 'up' },
        { label: 'Inadimplência', valor: `${resumo.inadimplencia.toFixed(1).replace('.', ',')}%`, trend: '+2,1%', cls: 'down' }
      ];

      secondary.forEach((item) => {
        const node = kpiTemplate.cloneNode(true);
        node.querySelector('.kpi-label').textContent = item.label;
        node.querySelector('.kpi-value').textContent = typeof item.valor === 'number' ? money(item.valor) : item.valor;
        const trend = node.querySelector('.kpi-trend');
        trend.classList.add(item.cls);
        trend.textContent = `${item.trend} vs mês anterior`;
        document.querySelector('#secondary-kpi').append(node);
      });

      new Chart(document.querySelector('#chart-evolucao'), {
        type: 'line',
        data: {
          labels: data.evolucaoFinanceira.labels,
          datasets: [
            { label: 'Receita', data: data.evolucaoFinanceira.receita, borderColor: '#16a34a', backgroundColor: '#16a34a22', tension: .35 },
            { label: 'Despesa', data: data.evolucaoFinanceira.despesa, borderColor: '#dc2626', backgroundColor: '#dc262622', tension: .35 },
            {
              label: 'Resultado',
              data: data.evolucaoFinanceira.receita.map((v, i) => v - data.evolucaoFinanceira.despesa[i]),
              borderColor: '#2563eb',
              backgroundColor: '#2563eb22',
              tension: .35
            }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      new Chart(document.querySelector('#chart-receita-origem'), {
        type: 'doughnut',
        data: { labels: data.receitaPorOrigem.labels, datasets: [{ data: data.receitaPorOrigem.valores, backgroundColor: data.receitaPorOrigem.cores }] },
        options: { plugins: { legend: { position: 'bottom' } } }
      });

      new Chart(document.querySelector('#chart-despesas-categoria'), {
        type: 'doughnut',
        data: { labels: data.despesasPorCategoria.labels, datasets: [{ data: data.despesasPorCategoria.valores, backgroundColor: data.despesasPorCategoria.cores }] },
        options: { plugins: { legend: { position: 'bottom' } } }
      });

      const tableTemplate = await loadTemplate('./components/financial-table.html', '#financial-table-template');
      const receber = data.lancamentos.filter((item) => item.tipo === 'entrada');
      const pagar = data.lancamentos.filter((item) => item.tipo === 'saida');

      const tableData = [
        {
          title: 'Contas a receber',
          rows: receber,
          total: receber.reduce((acc, cur) => acc + cur.valor, 0),
          headers: ['Paciente / Origem', 'Vencimento', 'Valor', 'Status'],
          pick: (row) => [row.origem, row.data_vencimento, money(row.valor), `<span class="status ${statusClass(row.status)}">${row.status}</span>`]
        },
        {
          title: 'Contas a pagar',
          rows: pagar,
          total: pagar.reduce((acc, cur) => acc + cur.valor, 0),
          headers: ['Fornecedor', 'Vencimento', 'Valor', 'Status'],
          pick: (row) => [row.origem, row.data_vencimento, money(row.valor), `<span class="status ${statusClass(row.status)}">${row.status}</span>`]
        }
      ];

      tableData.forEach((table) => {
        const node = tableTemplate.cloneNode(true);
        node.querySelector('.table-title').textContent = table.title;
        node.querySelector('.table-total').textContent = money(table.total);
        node.querySelector('thead').innerHTML = `<tr>${table.headers.map((h) => `<th>${h}</th>`).join('')}</tr>`;
        node.querySelector('tbody').innerHTML = table.rows
          .map((row) => `<tr>${table.pick(row).map((value) => `<td>${value}</td>`).join('')}</tr>`)
          .join('');
        document.querySelector('#tables').append(node);
      });

      document.querySelector('#alerts').innerHTML = data.alertasFinanceiros
        .map((alerta) => `<div class="alert-item ${alerta.tipo}"><i class="ri-alarm-warning-line"></i><span>${alerta.texto}</span></div>`)
        .join('');
    }

    render();
  </script>
</body>
</html>
