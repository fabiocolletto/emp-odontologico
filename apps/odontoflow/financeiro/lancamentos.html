<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odontoflow | Lançamentos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" />
  <style>
    :root {
      --bg: #f2f5fb;
      --card: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --verde: #16a34a;
      --vermelho: #dc2626;
      --azul: #2563eb;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); font-family: Inter, system-ui, sans-serif; color: var(--text); padding: 1rem; }
    .page { max-width: 1300px; margin: 0 auto; display: grid; gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .8rem; }
    .btn { border: 1px solid #bfdbfe; color: var(--azul); background: #fff; padding: .65rem .85rem; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; }
    th, td { padding: .65rem .5rem; border-bottom: 1px solid #edf2f7; text-align: left; font-size: .88rem; }
    th { color: var(--muted); }
    .status { font-size: .76rem; border-radius: 999px; padding: .2rem .55rem; font-weight: 700; }
    .status.pago, .status.recebido { background: #dcfce7; color: var(--verde); }
    .status.previsto { background: #fef3c7; color: #a16207; }
    .status.vencido { background: #fee2e2; color: var(--vermelho); }
    .tag-entrada { color: var(--verde); font-weight: 700; }
    .tag-saida { color: var(--vermelho); font-weight: 700; }
    .actions button { border: 0; background: transparent; cursor: pointer; font-size: 1rem; }

    form { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: .75rem; }
    label { display: grid; gap: .35rem; font-size: .85rem; color: var(--muted); }
    input, select, textarea {
      padding: .6rem .65rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }
    textarea { min-height: 74px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .form-actions { grid-column: 1 / -1; display: flex; gap: .5rem; justify-content: flex-end; }
    .btn.danger { border-color: #fecaca; color: var(--vermelho); }

    @media (max-width: 980px) { form { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 720px) { body { padding: .6rem; } form { grid-template-columns: 1fr; } table { min-width: 100%; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="card header">
      <div>
        <span style="color:var(--azul); font-weight:700;">Financeiro</span>
        <h1 style="margin:.2rem 0;">Lançamentos Financeiros</h1>
        <p style="margin:0; color:var(--muted);">Cadastro e manutenção de entradas e saídas.</p>
      </div>
      <button class="btn" id="novo-lancamento"><i class="ri-add-line"></i> Novo lançamento</button>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tipo</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Status</th><th>Vencimento</th><th>Pagamento</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-lancamentos"></tbody>
        </table>
      </div>
    </section>

    <section class="card" id="form-section" hidden>
      <h3 id="form-title">Novo lançamento</h3>
      <form id="form-lancamento">
        <input type="hidden" id="id" />
        <label>Tipo
          <select id="tipo" required>
            <option value="entrada">entrada</option>
            <option value="saida">saida</option>
          </select>
        </label>
        <label>Descrição <input id="descricao" required /></label>
        <label>Categoria <input id="categoria" required /></label>
        <label>Subcategoria <input id="subcategoria" /></label>
        <label>Valor <input id="valor" type="number" min="0" step="0.01" required /></label>
        <label>Status
          <select id="status" required>
            <option value="previsto">previsto</option>
            <option value="pago">pago</option>
            <option value="recebido">recebido</option>
            <option value="vencido">vencido</option>
          </select>
        </label>
        <label>Data competência <input id="data_competencia" type="date" /></label>
        <label>Data vencimento <input id="data_vencimento" type="date" required /></label>
        <label>Data pagamento <input id="data_pagamento" type="date" /></label>
        <label>Origem <input id="origem" required /></label>
        <label>Paciente ID <input id="paciente_id" type="number" min="1" /></label>
        <label>Profissional ID <input id="profissional_id" type="number" min="1" /></label>
        <label class="full">Observações <textarea id="observacoes"></textarea></label>
        <div class="form-actions">
          <button class="btn danger" type="button" id="cancelar">Cancelar</button>
          <button class="btn" type="submit">Salvar lançamento</button>
        </div>
      </form>
    </section>
  </main>

  <script src="./data/mock-financeiro.js"></script>
  <script>
    const STORAGE_KEY = 'odontoflow-financeiro-lancamentos';
    const currency = (value) => Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    const state = {
      lancamentos: [],
      editingId: null
    };

    function seed() {
      const existing = localStorage.getItem(STORAGE_KEY);
      if (!existing) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(window.financeiroMock.lancamentos));
      }
      state.lancamentos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.lancamentos));
    }

    function renderTable() {
      const tbody = document.querySelector('#lista-lancamentos');
      tbody.innerHTML = state.lancamentos
        .map((item) => `
          <tr>
            <td><span class="tag-${item.tipo}">${item.tipo}</span></td>
            <td>${item.descricao}</td>
            <td>${item.categoria}</td>
            <td>${currency(item.valor)}</td>
            <td><span class="status ${item.status}">${item.status}</span></td>
            <td>${item.data_vencimento || '-'}</td>
            <td>${item.data_pagamento || '-'}</td>
            <td class="actions">
              <button title="Editar" onclick="editLancamento(${item.id})"><i class="ri-edit-line"></i></button>
              <button title="Excluir" onclick="deleteLancamento(${item.id})"><i class="ri-delete-bin-line"></i></button>
            </td>
          </tr>
        `)
        .join('');
    }

    function openForm(title = 'Novo lançamento') {
      document.querySelector('#form-section').hidden = false;
      document.querySelector('#form-title').textContent = title;
    }

    function resetForm() {
      document.querySelector('#form-lancamento').reset();
      document.querySelector('#id').value = '';
      state.editingId = null;
    }

    function fillForm(data) {
      Object.entries(data).forEach(([key, value]) => {
        const field = document.querySelector(`#${key}`);
        if (field) field.value = value ?? '';
      });
    }

    window.editLancamento = function(id) {
      const found = state.lancamentos.find((item) => item.id === id);
      if (!found) return;
      state.editingId = id;
      openForm('Editar lançamento');
      fillForm(found);
    }

    window.deleteLancamento = function(id) {
      state.lancamentos = state.lancamentos.filter((item) => item.id !== id);
      persist();
      renderTable();
    }

    document.querySelector('#novo-lancamento').addEventListener('click', () => {
      resetForm();
      openForm();
    });

    document.querySelector('#cancelar').addEventListener('click', () => {
      document.querySelector('#form-section').hidden = true;
      resetForm();
    });

    document.querySelector('#form-lancamento').addEventListener('submit', (event) => {
      event.preventDefault();
      const payload = {
        id: state.editingId || Date.now(),
        tipo: document.querySelector('#tipo').value,
        descricao: document.querySelector('#descricao').value,
        categoria: document.querySelector('#categoria').value,
        subcategoria: document.querySelector('#subcategoria').value,
        valor: Number(document.querySelector('#valor').value),
        status: document.querySelector('#status').value,
        data_competencia: document.querySelector('#data_competencia').value,
        data_vencimento: document.querySelector('#data_vencimento').value,
        data_pagamento: document.querySelector('#data_pagamento').value,
        origem: document.querySelector('#origem').value,
        paciente_id: document.querySelector('#paciente_id').value ? Number(document.querySelector('#paciente_id').value) : null,
        profissional_id: document.querySelector('#profissional_id').value ? Number(document.querySelector('#profissional_id').value) : null,
        observacoes: document.querySelector('#observacoes').value
      };

      if (state.editingId) {
        state.lancamentos = state.lancamentos.map((item) => item.id === state.editingId ? payload : item);
      } else {
        state.lancamentos.unshift(payload);
      }

      persist();
      renderTable();
      document.querySelector('#form-section').hidden = true;
      resetForm();
    });

    seed();
    renderTable();
  </script>
</body>
</html>
